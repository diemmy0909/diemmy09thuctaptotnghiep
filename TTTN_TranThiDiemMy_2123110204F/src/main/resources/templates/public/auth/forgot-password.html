<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page" style="max-width: 400px;">
        <h2>Quên mật khẩu</h2>
        <p style="color:#64748b;margin-bottom:1rem;text-align:center">Nhập email của bạn để nhận mã OTP khôi phục mật khẩu</p>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <form th:action="@{/quen-mat-khau}" method="post">
            <div class="form-group">
                <label>Email đã đăng ký</label>
                <input type="email" name="email" class="form-control" placeholder="nhap.email@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Gửi mã OTP</button>
        </form>
        <p style="text-align:center;margin-top:1.5rem"><a th:href="@{/dang-nhap}">Quay lại đăng nhập</a></p>
    </div>
</section>
</body>
</html>
