<!DOCTYPE html>
<html th:replace="~{public/layout :: html(content=~{::section})}">
<head>
    <title th:text="${pageTitle} + ' | AluminumTravel'"></title>
</head>
<body>
<section th:fragment="content" style="padding-bottom: 4rem;">
    <!-- Hero Banner -->
    <div style="width: 100%; height: 400px; background: #e2e8f0; position: relative;">
        <img th:src="${activity.imageUrl}" style="width: 100%; height: 100%; object-fit: cover;" alt="Activity Image">
        <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(15,23,42,0.8), transparent); padding: 2rem;">
            <div class="container">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h1 style="color: white; font-size: 2.5rem; font-weight: 800; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3);" th:text="${activity.title}"></h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Grid -->
    <div class="container" style="margin-top: 2rem;">
        <div style="display: grid; grid-template-columns: 1fr; gap: 2rem; align-items: flex-start;">
            
            <!-- Left Column: Details -->
            <div style="background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <h2 style="font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">Mô tả chi tiết</h2>
                <div style="color: #475569; font-size: 1rem; line-height: 1.8; white-space: pre-line;" th:text="${activity.description}">
                </div>
            </div>



        </div>
    </div>
</section>



</body>
</html>
