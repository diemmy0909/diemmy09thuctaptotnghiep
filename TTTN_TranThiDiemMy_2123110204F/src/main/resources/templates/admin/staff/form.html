<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="card" style="max-width:560px">
        <form th:action="@{/admin/staff/save}" method="post">
            <input type="hidden" name="id" th:value="${staff.id}">
            <div class="form-group"><label>Họ tên *</label><input name="fullName" class="form-control" th:value="${staff.fullName}" required></div>
            <div class="form-group"><label>Email *</label><input type="email" name="email" class="form-control" th:value="${staff.email}" required></div>
            <div class="form-group"><label>SĐT</label><input name="phone" class="form-control" th:value="${staff.phone}"></div>
            <div class="form-group">
                <label>Role *</label>
                <select name="role" class="form-control" required>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${staff.role == r}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Mật khẩu <span th:if="${staff.id != null}" style="font-weight:normal;color:#64748b">(để trống nếu không đổi)</span></label>
                <input type="password" name="password" class="form-control">
            </div>
            <div class="btn-group"><button class="btn btn-primary">Lưu</button><a th:href="@{/admin/staff}" class="btn btn-secondary">Hủy</a></div>
        </form>
    </div>
</section>
</body>
</html>
