<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::main})}">
<head>
    <title>Lịch sử đặt vé máy bay</title>
</head>
<body>
<main>
    <div class="container page-layout" style="margin-top: 4rem; margin-bottom: 5rem;">
        <aside class="filter-panel">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 80px; height: 80px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem;">👤</div>
                <h3 th:text="${user.fullName}">User Name</h3>
            </div>
            
            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a th:href="@{/ho-so}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">👤 Thông tin cá nhân</a>
                <a th:href="@{/lich-su-dat-phong}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">🏨 Lịch sử đặt phòng</a>
                <a th:href="@{/lich-su-dat-ve}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #10b981; font-weight: bold; background: #f1f5f9;">✈️ Lịch sử chuyến bay</a>
                <a th:href="@{/lich-su-dat-ve-tour}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">🎟️ Lịch sử vé & tour</a>
            </nav>
        </aside>

        <div>
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Lịch sử đặt vé máy bay</h2>
            
            <div class="card">
                <div style="overflow-x:auto">
                    <table class="table" style="min-width: 700px;">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Chuyến bay</th>
                                <th>Khởi hành</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b : ${flightBookings}">
                                <td th:text="${b.bookingCode}"></td>
                                <td>
                                    <strong th:text="${b.flight.airline} + ' - ' + ${b.flight.flightNumber}"></strong><br>
                                    <small th:text="${b.flight.departureCity} + ' ✈️ ' + ${b.flight.arrivalCity}"></small><br>
                                    <small style="color:#64748b;" th:text="${b.passengers} + ' hành khách'"></small><br>
                                    <small th:if="${b.seatNumbers != null and !b.seatNumbers.isBlank()}" th:text="'Ghế (đi): ' + ${b.seatNumbers}"></small>
                                    <small th:if="${b.mealOption != null and !b.mealOption.isBlank()}" th:text="'| Suất ăn (đi): ' + ${b.mealOption}"></small>
                                    <th:block th:if="${b.returnFlight != null}">
                                        <hr style="margin:4px 0; border:none; border-top:1px dashed #cbd5e1;">
                                        <strong th:text="${b.returnFlight.airline} + ' - ' + ${b.returnFlight.flightNumber}"></strong><br>
                                        <small th:text="${b.returnFlight.departureCity} + ' ✈️ ' + ${b.returnFlight.arrivalCity}"></small><br>
                                        <small th:if="${b.returnSeatNumbers != null and !b.returnSeatNumbers.isBlank()}" th:text="'Ghế (về): ' + ${b.returnSeatNumbers}"></small>
                                        <small th:if="${b.returnMealOption != null and !b.returnMealOption.isBlank()}" th:text="'| Suất ăn (về): ' + ${b.returnMealOption}"></small>
                                    </th:block>
                                </td>
                                <td>
                                    <div th:text="${#temporals.format(b.flight.departureTime, 'HH:mm')}"></div>
                                    <small style="color:#64748b; margin-bottom:8px; display:block;" th:text="${#temporals.format(b.flight.departureTime, 'dd/MM/yyyy')}"></small>
                                    <th:block th:if="${b.returnFlight != null}">
                                        <div th:text="${#temporals.format(b.returnFlight.departureTime, 'HH:mm')}"></div>
                                        <small style="color:#64748b;" th:text="${#temporals.format(b.returnFlight.departureTime, 'dd/MM/yyyy')}"></small>
                                    </th:block>
                                </td>
                                <td th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                <td>
                                    <span th:class="'badge badge-' + ${b.status.name().toLowerCase()}" th:text="${b.status}"></span>
                                </td>
                                <td>
                                    <form th:if="${b.status.name() == 'PENDING' or b.status.name() == 'CONFIRMED'}" 
                                          th:action="@{/lich-su-dat-ve/{id}/cancel(id=${b.id})}" method="post" 
                                          onsubmit="return confirm('Bạn có chắc chắn muốn hủy đơn này?');">
                                        <button type="submit" class="btn btn-danger btn-sm">Hủy</button>
                                    </form>
                                    <span th:unless="${b.status.name() == 'PENDING' or b.status.name() == 'CONFIRMED'}" style="color:#94a3b8; font-size:0.9rem;">-</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(flightBookings)}">
                                <td colspan="6" style="text-align:center; padding: 2rem;">Bạn chưa đặt dịch vụ nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
