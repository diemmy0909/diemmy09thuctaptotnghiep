<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page">
        <h2>Đăng ký tài khoản</h2>
        <form th:action="@{/dang-ky}" method="post">
            <div class="form-group"><label>Họ tên</label><input name="fullName" class="form-control" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" required></div>
            <div class="form-group"><label>Số điện thoại</label><input name="phone" class="form-control"></div>
            <div class="form-group"><label>Mật khẩu</label><input type="password" name="password" class="form-control" required></div>
            <div class="form-group"><label>Xác nhận mật khẩu</label><input type="password" name="confirmPassword" class="form-control" required></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Đăng ký</button>
        </form>
        <p style="text-align:center;margin-top:1rem"><a th:href="@{/dang-nhap}">Đã có tài khoản? Đăng nhập</a></p>
    </div>
</section>
</body>
</html>
