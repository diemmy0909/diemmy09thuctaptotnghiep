<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: layout(~{::main})">
<head>
    <title>Sửa/Thêm Hoạt động du lịch</title>
</head>
<body>
<main>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="margin:0;" th:text="${activity.id == null ? 'Thêm Hoạt động du lịch' : 'Sửa Hoạt động du lịch'}"></h2>
        <a th:href="@{/admin/activities}" class="btn btn-outline">Quay lại</a>
    </div>

    <div class="card" style="max-width:800px;">
        <div class="card-body">
            <form th:action="@{${activity.id == null ? '/admin/activities/create' : '/admin/activities/edit/' + activity.id}}" method="post" enctype="multipart/form-data">
                <div style="margin-bottom:1rem;">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:600">Tên hoạt động *</label>
                    <input type="text" name="title" class="form-control" th:value="${activity.title}" required>
                </div>
                
                <div style="margin-bottom:1rem;">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:600">Hình ảnh *</label>
                    <div th:if="${activity.imageUrl}" style="margin-bottom:0.5rem;">
                        <img th:src="${activity.imageUrl}" style="max-height: 100px; border-radius: 4px;" alt="Current Image">
                    </div>
                    <input type="file" name="imageFile" accept="image/*" class="form-control" th:required="${activity.id == null}">
                </div>

                <div style="margin-bottom:1rem;">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:600">Mô tả *</label>
                    <textarea name="description" class="form-control" rows="3" required th:text="${activity.description}"></textarea>
                </div>



                <div>
                    <button type="submit" class="btn btn-primary" style="background:#ef4444;border-color:#ef4444">Lưu hoạt động</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
