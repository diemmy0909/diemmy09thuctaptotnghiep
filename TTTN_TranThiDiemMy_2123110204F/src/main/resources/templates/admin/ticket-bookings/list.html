<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
        <h2>Quản lý Đơn đặt vé Tour & Tham Quan</h2>
    </div>
    
    <div class="card">
        <div style="overflow-x:auto">
            <table class="table" style="min-width: 900px;">
                <thead>
                    <tr>
                        <th>Mã Đơn</th>
                        <th>Khách hàng</th>
                        <th>Dịch vụ</th>
                        <th>Chi tiết vé</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.bookingCode}"></td>
                        <td>
                            <strong th:text="${b.customer.fullName}"></strong><br>
                            <small th:text="${b.customer.email}"></small><br>
                            <small th:text="${b.customer.phone}"></small>
                        </td>
                        <td>
                            <strong th:text="${b.ticket.title}"></strong><br>
                            <span class="badge" th:text="${b.ticket.category.displayName}"></span><br>
                            <small th:text="${b.ticket.location}"></small>
                        </td>
                        <td>
                            <span th:text="'Ngày đi: ' + ${#temporals.format(b.participationDate, 'dd/MM/yyyy')}"></span><br>
                            <small th:text="${b.adultCount} + ' người lớn'"></small><br>
                            <small th:text="${b.childCount} + ' trẻ em'"></small>
                        </td>
                        <td th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="'badge badge-' + ${b.status.name().toLowerCase()}" th:text="${b.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{/admin/ticket-bookings/{id}/status(id=${b.id})}" method="post" style="display:flex;gap:0.5rem;align-items:center;">
                                <select name="status" class="form-control" style="padding:0.25rem;font-size:0.875rem;">
                                    <option value="PENDING" th:selected="${b.status.name() == 'PENDING'}">PENDING</option>
                                    <option value="CONFIRMED" th:selected="${b.status.name() == 'CONFIRMED'}">CONFIRMED</option>
                                    <option value="COMPLETED" th:selected="${b.status.name() == 'COMPLETED'}">COMPLETED</option>
                                    <option value="CANCELLED" th:selected="${b.status.name() == 'CANCELLED'}">CANCELLED</option>
                                </select>
                                <button type="submit" class="btn btn-primary" style="padding:0.25rem 0.5rem;font-size:0.875rem;">Cập nhật</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="7" style="text-align:center">Chưa có đơn đặt vé nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
