<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page" style="max-width: 400px;">
        <h2>Đặt lại mật khẩu</h2>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <form th:action="@{/dat-lai-mat-khau}" method="post">
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" name="newPassword" class="form-control" required minlength="6">
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu mới</label>
                <input type="password" name="confirmPassword" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Đổi mật khẩu</button>
        </form>
    </div>
</section>
</body>
</html>
