<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="card" style="max-width:560px">
        <form th:action="@{/admin/promotions/save}" method="post">
            <input type="hidden" name="id" th:value="${promotion.id}">
            <div class="form-group"><label>Mã giảm giá *</label><input name="code" class="form-control" th:value="${promotion.code}" required></div>
            <div class="form-group"><label>Mô tả</label><textarea name="description" class="form-control" th:text="${promotion.description}"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Giảm %</label><input type="number" name="discountPercent" class="form-control" th:value="${promotion.discountPercent}" min="0" max="100"></div>
                <div class="form-group"><label>Giảm tiền (VNĐ)</label><input type="number" name="discountAmount" class="form-control" th:value="${promotion.discountAmount}" min="0" step="1000"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Từ ngày *</label><input type="date" name="startDate" class="form-control" th:value="${promotion.startDate}" required></div>
                <div class="form-group"><label>Đến ngày *</label><input type="date" name="endDate" class="form-control" th:value="${promotion.endDate}" required></div>
            </div>
            <div class="form-group"><label><input type="checkbox" name="active" value="true" th:checked="${promotion.active != false}"> Đang hoạt động</label></div>
            <div class="form-group"><label><input type="checkbox" name="sendNotification" value="true"> 🔔 Gửi thông báo cho toàn bộ khách hàng</label></div>
            <div class="btn-group"><button class="btn btn-primary">Lưu</button><a th:href="@{/admin/promotions}" class="btn btn-secondary">Hủy</a></div>
        </form>
    </div>
</section>
</body>
</html>
