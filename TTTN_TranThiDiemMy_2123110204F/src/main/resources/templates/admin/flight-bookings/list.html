<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
        <h2>Quản lý Đặt Vé Máy Bay</h2>
    </div>
    
    <div class="card">
        <div style="overflow-x:auto">
            <table class="table" style="min-width: 900px;">
                <thead>
                    <tr>
                        <th>Mã Đơn</th>
                        <th>Khách hàng</th>
                        <th>Chuyến bay</th>
                        <th>Chi tiết</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.bookingCode}"></td>
                        <td>
                            <strong th:text="${b.customer.fullName}"></strong><br>
                            <small th:text="${b.customer.email}"></small><br>
                            <small th:text="${b.customer.phone}"></small>
                        </td>
                        <td>
                            <strong th:text="${b.flight.airline}"></strong><br>
                            <span th:text="${b.flight.departureCity} + ' - ' + ${b.flight.arrivalCity}"></span><br>
                            <small th:text="${#temporals.format(b.flight.departureTime, 'dd/MM/yyyy HH:mm')}"></small>
                            <th:block th:if="${b.returnFlight != null}">
                                <div style="margin-top:0.5rem; padding-top:0.5rem; border-top:1px dashed #cbd5e1;">
                                    <strong th:text="${b.returnFlight.airline}"></strong> (Về)<br>
                                    <span th:text="${b.returnFlight.departureCity} + ' - ' + ${b.returnFlight.arrivalCity}"></span><br>
                                    <small th:text="${#temporals.format(b.returnFlight.departureTime, 'dd/MM/yyyy HH:mm')}"></small>
                                </div>
                            </th:block>
                        </td>
                        <td>
                            <span th:text="${b.passengers} + ' khách'"></span><br>
                            <small th:if="${b.extraBaggageKg > 0}" th:text="'+' + ${b.extraBaggageKg} + 'kg hành lý'"></small><br>
                            <small th:if="${b.seatNumbers != null and !b.seatNumbers.isBlank()}" th:text="'Ghế (đi): ' + ${b.seatNumbers}"></small><br th:if="${b.seatNumbers != null and !b.seatNumbers.isBlank()}">
                            <small th:if="${b.mealOption != null and !b.mealOption.isBlank()}" th:text="'Suất ăn (đi): ' + ${b.mealOption}"></small><br th:if="${b.mealOption != null and !b.mealOption.isBlank()}">
                            
                            <th:block th:if="${b.returnFlight != null}">
                                <small th:if="${b.returnSeatNumbers != null and !b.returnSeatNumbers.isBlank()}" th:text="'Ghế (về): ' + ${b.returnSeatNumbers}"></small><br th:if="${b.returnSeatNumbers != null and !b.returnSeatNumbers.isBlank()}">
                                <small th:if="${b.returnMealOption != null and !b.returnMealOption.isBlank()}" th:text="'Suất ăn (về): ' + ${b.returnMealOption}"></small>
                            </th:block>
                        </td>
                        <td th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:class="'badge badge-' + ${b.status.name().toLowerCase()}" th:text="${b.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{/admin/flight-bookings/{id}/status(id=${b.id})}" method="post" style="display:flex;gap:0.5rem;align-items:center;">
                                <select name="status" class="form-control" style="padding:0.25rem;font-size:0.875rem;">
                                    <option value="PENDING" th:selected="${b.status.name() == 'PENDING'}">PENDING</option>
                                    <option value="CONFIRMED" th:selected="${b.status.name() == 'CONFIRMED'}">CONFIRMED</option>
                                    <option value="COMPLETED" th:selected="${b.status.name() == 'COMPLETED'}">COMPLETED</option>
                                    <option value="CANCELLED" th:selected="${b.status.name() == 'CANCELLED'}">CANCELLED</option>
                                </select>
                                <button type="submit" class="btn btn-primary" style="padding:0.25rem 0.5rem;font-size:0.875rem;">Cập nhật</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="7" style="text-align:center">Chưa có đơn đặt vé nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
