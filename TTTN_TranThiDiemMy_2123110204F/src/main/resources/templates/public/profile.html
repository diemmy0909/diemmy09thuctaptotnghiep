<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="container" style="padding:2rem 0">
        <h1>Hồ sơ cá nhân</h1>
        <div class="detail-grid" style="margin-top:1.5rem">
            <div class="form-page" style="margin:0">
                <h3>Cập nhật thông tin</h3>
                <form th:action="@{/ho-so}" method="post">
                    <div class="form-group"><label>Họ tên</label><input name="fullName" th:value="${user.fullName}" class="form-control" required></div>
                    <div class="form-group"><label>Email</label><input th:value="${user.email}" class="form-control" disabled></div>
                    <div class="form-group"><label>Số điện thoại</label><input name="phone" th:value="${user.phone}" class="form-control"></div>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </form>
            </div>
            <div>
                <h3>Lịch sử đặt phòng gần đây</h3>
                <table class="table-bookings">
                    <thead><tr><th>Mã</th><th>Phòng</th><th>Tổng</th><th>TT</th><th>Hành động</th></tr></thead>
                    <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.bookingCode}"></td>
                        <td th:text="${b.room.roomType}"></td>
                        <td th:text="${#numbers.formatDecimal(b.totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></td>
                        <td th:text="${b.status}"></td>
                        <td>
                            <form th:if="${b.status.name() == 'PENDING' or b.status.name() == 'CONFIRMED'}" th:action="@{/lich-su-dat-phong/{id}/cancel(id=${b.id})}" method="post" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn hủy phòng này?');">
                                <button type="submit" class="btn btn-sm" style="background-color:#ef4444;color:white;border:none;padding:2px 4px;border-radius:4px;cursor:pointer;font-size:0.75rem;">Hủy</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <a th:href="@{/lich-su-dat-phong}" class="btn btn-outline btn-sm">Xem tất cả phòng</a>
                    <a th:href="@{/lich-su-dat-ve-tour}" class="btn btn-outline btn-sm">Xem lịch sử vé/tour</a>
                    <a th:href="@{/yeu-thich}" class="btn btn-outline btn-sm" style="color:#e11d48; border-color:#e11d48">❤️ Yêu thích</a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
