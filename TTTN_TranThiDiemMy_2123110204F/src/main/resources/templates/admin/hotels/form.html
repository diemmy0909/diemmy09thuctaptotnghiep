<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="card" style="max-width:720px">
        <form th:action="@{/admin/hotels/save}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="id" th:value="${hotel.id}">
            <div class="form-group">
                <label>Tên khách sạn *</label>
                <input type="text" name="name" class="form-control" th:value="${hotel.name}" required>
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" name="address" class="form-control" th:value="${hotel.address}">
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea name="description" class="form-control" th:text="${hotel.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Số sao</label>
                <input type="number" name="starRating" class="form-control" min="1" max="5" th:value="${hotel.starRating != null ? hotel.starRating : 3}">
            </div>
            <div class="form-group">
                <label>Khoảng cách đến trung tâm (km)</label>
                <input type="number" name="distanceToCenter" class="form-control" step="0.1" min="0" th:value="${hotel.distanceToCenter}">
            </div>
            <div class="form-group">
                <label>Hình ảnh khách sạn</label>
                <div th:if="${hotel.imageUrl}" style="margin-bottom:0.75rem">
                    <img th:src="${hotel.imageUrl}" class="img-detail" style="max-height:160px" alt="Ảnh hiện tại">
                    <p style="font-size:0.8rem;color:#64748b;margin:0.35rem 0 0">Ảnh hiện tại (chọn file mới để thay)</p>
                </div>
                <input type="file" name="imageFile" class="form-control" accept="image/jpeg,image/png,image/gif,image/webp">
                <p style="font-size:0.8rem;color:#64748b;margin:0.35rem 0 0">Chọn ảnh từ máy tính (JPG, PNG, GIF, WEBP — tối đa 10MB). Lưu vào database.</p>
            </div>
            <div class="form-group">
                <label>Tiện nghi</label>
                <div class="checkbox-group">
                    <label th:each="a : ${amenities}">
                        <input type="checkbox" name="amenityIds" th:value="${a.id}"
                               th:checked="${hotel.amenities != null and hotel.amenities.contains(a)}">
                        <span th:text="${a.name}"></span>
                    </label>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/admin/hotels}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
