spring.application.name=demo
spring.profiles.active=local

# MySQL - database datphongkhachsan (HeidiSQL session "khachsan")
spring.datasource.url=jdbc:mysql://localhost:3306/datphongkhachsan?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=uploads

# ==============================================================
# HƯỚNG DẪN CẤU HÌNH GỬI EMAIL OTP
# ==============================================================

# CẤU HÌNH GỬI EMAIL (SMTP GMAIL)
# Thay email và mật khẩu ứng dụng thật của bạn vào đây
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=dummy-password-16-chars
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
