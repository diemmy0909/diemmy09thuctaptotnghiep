<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::main})}">
<head>
    <title>Yêu thích của tôi</title>
</head>
<body>
<main>
    <div class="container page-layout" style="margin-top: 4rem; margin-bottom: 5rem;">
        <aside class="filter-panel">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 80px; height: 80px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem;">👤</div>
                <h3 th:text="${#authentication.principal.fullName}">User Name</h3>
            </div>
            
            <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a th:href="@{/ho-so}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">👤 Thông tin cá nhân</a>
                <a th:href="@{/lich-su-dat-phong}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">🏨 Lịch sử đặt phòng</a>
                <a th:href="@{/lich-su-dat-ve}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">✈️ Lịch sử chuyến bay</a>
                <a th:href="@{/lich-su-dat-ve-tour}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #475569;">🎟️ Lịch sử vé & tour</a>
                <a th:href="@{/yeu-thich}" class="nav-link" style="padding: 10px; border-radius: 8px; text-decoration: none; color: #e11d48; font-weight: bold; background: #ffe4e6;">❤️ Yêu thích của tôi</a>
            </nav>
        </aside>

        <div>
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: #e11d48;">❤️ Dịch vụ đã lưu</h2>
            
            <style>
                .tab-nav {
                    display: flex; gap: 1rem; border-bottom: 2px solid #e2e8f0; margin-bottom: 2rem;
                }
                .tab-btn {
                    background: none; border: none; padding: 10px 20px; font-weight: 600; color: #64748b; font-size: 1rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.3s;
                }
                .tab-btn.active {
                    color: #e11d48; border-bottom-color: #e11d48;
                }
                .tab-content { display: none; }
                .tab-content.active { display: block; }
                
                .fav-remove-btn {
                    background: #f1f5f9; color: #64748b; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
                }
                .fav-remove-btn:hover { background: #fee2e2; color: #ef4444; }
            </style>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('hotel')">🏨 Khách sạn (<span th:text="${favoriteHotels.size()}"></span>)</button>
                <button class="tab-btn" onclick="switchTab('flight')">✈️ Chuyến bay (<span th:text="${favoriteFlights.size()}"></span>)</button>
                <button class="tab-btn" onclick="switchTab('ticket')">🎟️ Tour & Vé (<span th:text="${favoriteTickets.size()}"></span>)</button>
            </div>

            <!-- Tab Khách sạn -->
            <div id="tab-hotel" class="tab-content active">
                <div th:if="${favoriteHotels.isEmpty()}" style="text-align: center; padding: 3rem; color: #94a3b8; background: #f8fafc; border-radius: 12px;">Bạn chưa lưu khách sạn nào.</div>
                <div class="grid">
                    <div th:each="f : ${favoriteHotels}" class="card" style="border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);" th:id="'fav-hotel-' + ${f.hotel.id}">
                        <div style="height: 180px; position: relative;">
                            <img th:src="${f.hotel.imageUrl}" style="width: 100%; height: 100%; object-fit: cover;">
                            <div style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 8px; font-weight: bold; color: #d97706;" th:text="'⭐ ' + ${f.hotel.stars}"></div>
                        </div>
                        <div style="padding: 1.5rem;">
                            <h3 th:text="${f.hotel.name}" style="margin: 0 0 0.5rem 0; font-size: 1.2rem;"></h3>
                            <div style="color: #64748b; font-size: 0.9rem; margin-bottom: 1rem;">📍 <span th:text="${f.hotel.city}"></span></div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <a th:href="@{/khach-san/{id}(id=${f.hotel.id})}" style="color: #10b981; text-decoration: none; font-weight: 600;">Xem lại</a>
                                <button class="fav-remove-btn" th:onclick="'removeFav(\'hotels\', ' + ${f.hotel.id} + ')'">Xóa</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Chuyến bay -->
            <div id="tab-flight" class="tab-content">
                <div th:if="${favoriteFlights.isEmpty()}" style="text-align: center; padding: 3rem; color: #94a3b8; background: #f8fafc; border-radius: 12px;">Bạn chưa lưu chuyến bay nào.</div>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div th:each="f : ${favoriteFlights}" class="card" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;" th:id="'fav-flight-' + ${f.flight.id}">
                        <div>
                            <div style="font-weight: 700; color: #0f172a; font-size: 1.1rem;" th:text="${f.flight.airline} + ' (' + ${f.flight.flightNumber} + ')'"></div>
                            <div style="color: #64748b; font-size: 0.9rem; margin-top: 0.5rem;">
                                <span th:text="${f.flight.departureCity} + ' ➔ ' + ${f.flight.arrivalCity}"></span> | 
                                <span th:text="${#temporals.format(f.flight.departureTime, 'dd/MM/yyyy HH:mm')}"></span>
                            </div>
                            <div style="color: #f59e0b; font-weight: 700; margin-top: 0.5rem;" th:text="${#numbers.formatDecimal(f.flight.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <a th:href="@{/dat-ve-may-bay(flightId=${f.flight.id})}" class="btn btn-primary btn-sm">Đặt vé</a>
                            <button class="fav-remove-btn" th:onclick="'removeFav(\'flights\', ' + ${f.flight.id} + ')'">Bỏ lưu</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Tour & Vé -->
            <div id="tab-ticket" class="tab-content">
                <div th:if="${favoriteTickets.isEmpty()}" style="text-align: center; padding: 3rem; color: #94a3b8; background: #f8fafc; border-radius: 12px;">Bạn chưa lưu tour/vé nào.</div>
                <div class="grid">
                    <div th:each="f : ${favoriteTickets}" class="card" style="border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);" th:id="'fav-ticket-' + ${f.ticket.id}">
                        <div style="height: 160px; position: relative;">
                            <img th:if="${f.ticket.imageUrl}" th:src="${f.ticket.imageUrl}" style="width: 100%; height: 100%; object-fit: cover;">
                            <div th:unless="${f.ticket.imageUrl}" style="width: 100%; height: 100%; background: #e2e8f0; display: flex; align-items: center; justify-content: center;">No Image</div>
                            <span style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;" th:text="${f.ticket.category.displayName}"></span>
                        </div>
                        <div style="padding: 1.5rem;">
                            <h3 th:text="${f.ticket.title}" style="margin: 0 0 0.5rem 0; font-size: 1.1rem; line-height: 1.4;"></h3>
                            <div style="color: #64748b; font-size: 0.85rem; margin-bottom: 1rem;">📍 <span th:text="${f.ticket.location}"></span></div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <a th:href="@{/ve-tham-quan/{id}(id=${f.ticket.id})}" style="color: #10b981; text-decoration: none; font-weight: 600;">Xem chi tiết</a>
                                <button class="fav-remove-btn" th:onclick="'removeFav(\'tickets\', ' + ${f.ticket.id} + ')'">Xóa</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        async function removeFav(type, id) {
            if (!confirm('Bạn có chắc muốn bỏ lưu mục này?')) return;
            try {
                const response = await fetch(`/api/favorites/${type}/${id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'removed') {
                        // Ẩn UI
                        const el = document.getElementById('fav-' + type.slice(0, -1) + '-' + id);
                        if(el) {
                            el.style.opacity = '0';
                            setTimeout(() => el.remove(), 300);
                        }
                    }
                } else if (response.status === 401) {
                    window.location.href = '/dang-nhap';
                }
            } catch (error) {
                console.error("Lỗi khi xóa:", error);
            }
        }
    </script>
</main>
</body>
</html>
