<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-header"><span></span><a th:href="@{/admin/staff/new}" class="btn btn-primary">+ Tạo tài khoản</a></div>
    <div class="card" style="padding:0;overflow:hidden">
        <table>
            <thead><tr><th>Họ tên</th><th>Email</th><th>SĐT</th><th>Role</th><th>Thao tác</th></tr></thead>
            <tbody>
            <tr th:each="s : ${staffList}">
                <td th:text="${s.fullName}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.phone}"></td>
                <td><span class="badge badge-confirmed" th:text="${s.role}"></span></td>
                <td class="btn-group">
                    <a th:href="@{/admin/staff/{id}/edit(id=${s.id})}" class="btn btn-primary btn-sm">Sửa</a>
                    <form th:action="@{/admin/staff/{id}/delete(id=${s.id})}" method="post" style="display:inline" onsubmit="return confirm('Xóa tài khoản?')">
                        <button class="btn btn-danger btn-sm">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
