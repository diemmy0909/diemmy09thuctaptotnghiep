<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page">
        <h2>Đăng nhập</h2>
        <p style="color:#64748b;margin-bottom:1rem">Tài khoản lưu trong database MySQL</p>
        <div th:if="${param.error}" class="alert alert-error">Email hoặc mật khẩu không đúng</div>
        <form th:action="@{/dang-nhap}" method="post">
            <input type="hidden" name="redirect" th:value="${redirect}">
            <div class="form-group"><label>Email</label><input type="email" name="username" class="form-control" required></div>
            <div class="form-group"><label>Mật khẩu</label><input type="password" name="password" class="form-control" required></div>
            <div style="text-align: right; margin-bottom: 1rem;">
                <a th:href="@{/quen-mat-khau}" style="font-size: 0.9rem; color: #0284c7;">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Đăng nhập</button>
        </form>

        <p style="text-align:center;margin-top:1.5rem">Chưa có tài khoản? <a th:href="@{/dang-ky}">Đăng ký</a></p>
    </div>
</section>
</body>
</html>
