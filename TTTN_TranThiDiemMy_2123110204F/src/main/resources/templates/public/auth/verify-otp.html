<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page" style="max-width: 400px;">
        <h2>Xác thực OTP</h2>
        <p style="color:#64748b;margin-bottom:1rem;text-align:center">Vui lòng nhập mã 6 số vừa được gửi đến email của bạn</p>
        <div th:if="${success}" class="alert alert-success" style="background:#dcfce7;color:#166534;padding:1rem;margin-bottom:1rem;border-radius:4px" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        
        <form th:action="@{/xac-nhan-otp}" method="post">
            <div class="form-group" style="text-align:center">
                <input type="text" name="otp" class="form-control" placeholder="123456" maxlength="6" style="text-align:center;font-size:1.5rem;letter-spacing:5px" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem">Xác nhận</button>
        </form>
    </div>
</section>
</body>
</html>
