<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{public/layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="form-page">
        <h2 style="margin-bottom:1rem">Đặt phòng</h2>
        <p th:text="${room.roomType} + ' - ' + ${room.hotel.name}"></p>
        <p class="card-price" id="totalPrice" th:text="'Tổng: ' + ${#numbers.formatDecimal(totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></p>
        <form th:action="@{/dat-phong}" method="post" style="margin-top:1.5rem">
            <input type="hidden" name="roomId" th:value="${room.id}">
            <div class="form-row">
                <div class="form-group"><label>Check-in</label><input type="date" id="checkIn" name="checkIn" th:value="${checkIn}" class="form-control" required onchange="calculateTotal()"></div>
                <div class="form-group"><label>Check-out</label><input type="date" id="checkOut" name="checkOut" th:value="${checkOut}" class="form-control" required onchange="calculateTotal()"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Số lượng phòng</label><input type="number" id="numberOfRooms" name="numberOfRooms" th:value="${numberOfRooms}" class="form-control" required min="1" onchange="calculateTotal()" oninput="calculateTotal()"></div>
                <div class="form-group"><label>Số lượng khách</label><input type="number" name="guests" th:value="${guests}" class="form-control" required min="1"></div>
            </div>
            <div class="form-group"><label>Họ tên</label><input name="fullName" th:value="${user.fullName}" class="form-control" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" th:value="${user.email}" class="form-control" required></div>
            <div class="form-group"><label>Số điện thoại</label><input name="phone" th:value="${user.phone}" class="form-control" required></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Xác nhận đặt phòng</button>
        </form>
    </div>
    <script th:inline="javascript">
        const pricePerNight = /*[[${room.price}]]*/ 0;
        function calculateTotal() {
            const checkInStr = document.getElementById('checkIn').value;
            const checkOutStr = document.getElementById('checkOut').value;
            if(!checkInStr || !checkOutStr) return;
            const checkIn = new Date(checkInStr);
            const checkOut = new Date(checkOutStr);
            const rooms = parseInt(document.getElementById('numberOfRooms').value) || 1;
            let nights = (checkOut - checkIn) / (1000 * 60 * 60 * 24);
            if (nights < 1) nights = 1;
            const total = pricePerNight * nights * rooms;
            document.getElementById('totalPrice').innerText = 'Tổng: ' + total.toLocaleString('en-US') + ' đ';
        }
    </script>
</section>
</body>
</html>
