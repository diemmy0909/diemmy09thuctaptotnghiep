<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: layout(~{::main})">
<head>
    <title>Thêm/Sửa Suất ăn</title>
</head>
<body>
<main style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="margin:0;" th:text="${meal.id == null ? 'Thêm Suất ăn mới' : 'Sửa Suất ăn'}"></h2>
        <a th:href="@{/admin/meals}" style="color:#64748b; text-decoration:none; font-weight:600;">&larr; Quay lại</a>
    </div>

    <form th:action="@{${meal.id == null ? '/admin/meals/create' : '/admin/meals/edit/' + meal.id}}" th:object="${meal}" method="post" enctype="multipart/form-data">
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:#334155;">Tên món ăn <span style="color:red;">*</span></label>
            <input type="text" th:field="*{name}" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="VD: Mì ý sốt bò băm" required>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:#334155;">Giá bán (VNĐ) <span style="color:red;">*</span></label>
            <input type="number" th:field="*{price}" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="VD: 100000" min="0" required>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:#334155;">Hình ảnh</label>
            <div style="margin-bottom: 1rem;">
                <img id="imagePreview" 
                     th:src="${meal.imageUrl != null ? meal.imageUrl : '#'}" 
                     alt="Hình ảnh suất ăn" 
                     style="max-width: 200px; border-radius: 8px; border: 1px solid #cbd5e1;"
                     th:styleappend="${meal.imageUrl == null ? 'display: none;' : ''}">
            </div>
            <input type="file" name="imageFile" accept="image/*" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: white;" onchange="previewImage(this)">
            <small style="color: #64748b; margin-top: 0.25rem; display: block;">Chấp nhận JPG, PNG, GIF, WEBP</small>
        </div>

        <script>
            function previewImage(input) {
                var preview = document.getElementById('imagePreview');
                if (input.files && input.files[0]) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    }
                    reader.readAsDataURL(input.files[0]);
                } else {
                    preview.src = '#';
                    preview.style.display = 'none';
                }
            }
        </script>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:#334155;">Trạng thái</label>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="radio" th:field="*{active}" value="true" required> Đang bán
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="radio" th:field="*{active}" value="false" required> Ngừng bán
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; padding: 12px; border-radius: 6px; border: none; background: #10b981; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;">Lưu thông tin</button>
    </form>
</main>
</body>
</html>
